# CI/CD 流水线 — 单元测试 + 代码质量检查
# 触发条件：push/PR 到 master 分支
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: 代码风格检查（ruff）
        run: ruff check backend/ tests/

      - name: 单元测试
        env:
          SKIP_E2E: "true"
          DEEPSEEK_API_KEY: "test-key-placeholder"
          ADMIN_API_KEY: "test-admin-key"
        run: pytest tests/unit/ -v --tb=short --maxfail=5

      - name: 测试覆盖率
        env:
          SKIP_E2E: "true"
          DEEPSEEK_API_KEY: "test-key-placeholder"
          ADMIN_API_KEY: "test-admin-key"
        run: pytest tests/unit/ --cov=backend --cov-report=term-missing --cov-fail-under=40

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker 镜像构建验证
        run: docker build -t kefu-agent:ci-test .
