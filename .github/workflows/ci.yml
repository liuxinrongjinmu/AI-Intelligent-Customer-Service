# CI/CD 流水线 — 单元测试 + 代码质量检查
# 触发条件：push/PR 到 master 分支
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"  # 缓存 pip 下载，加速 CI
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: 代码风格检查（ruff）
        run: ruff check backend/ tests/

      - name: 前端 JS 语法检查
        run: node -c frontend/static/js/chat.js && echo "JS 语法检查通过"

      - name: 类型检查（mypy）
        # 类型检查作为信息参考，暂不阻断 CI（可在修复所有类型错误后移除 continue-on-error）
        continue-on-error: true
        run: mypy backend/ --ignore-missing-imports --no-strict-optional

      - name: 单元测试
        env:
          SKIP_E2E: "true"
          DEEPSEEK_API_KEY: "test-key-placeholder"
          ADMIN_API_KEY: "test-admin-key"
        run: pytest tests/unit/ -v --tb=short --maxfail=5

      - name: 测试覆盖率
        env:
          SKIP_E2E: "true"
          DEEPSEEK_API_KEY: "test-key-placeholder"
          ADMIN_API_KEY: "test-admin-key"
        run: pytest tests/unit/ --cov=backend --cov-report=term-missing --cov-fail-under=70

  eval:
    name: Quality Evaluation
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Run retrieval eval
        run: python -m tests.eval.eval_retrieval
      - name: Run intent eval
        run: python -m tests.eval.eval_intent

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements-lock.txt --ignore-vuln GHSA-xxxx

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker 镜像构建验证
        run: docker build -t kefu-agent:ci-test .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: 构建并推送 Docker 镜像
        run: |
          IMAGE_TAG="${GITHUB_SHA::8}"
          docker build -t kefu-agent:${IMAGE_TAG} -t kefu-agent:latest .
          echo "镜像构建完成: kefu-agent:${IMAGE_TAG}"
          # 推送镜像（需在 GitHub Secrets 中配置 REGISTRY_URL / REGISTRY_USER / REGISTRY_PASS）
          if [ -n "${{ secrets.REGISTRY_URL }}" ]; then
            echo "${{ secrets.REGISTRY_PASS }}" | docker login "${{ secrets.REGISTRY_URL }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin
            docker tag kefu-agent:${IMAGE_TAG} ${{ secrets.REGISTRY_URL }}/kefu-agent:${IMAGE_TAG}
            docker tag kefu-agent:latest ${{ secrets.REGISTRY_URL }}/kefu-agent:latest
            docker push ${{ secrets.REGISTRY_URL }}/kefu-agent:${IMAGE_TAG}
            docker push ${{ secrets.REGISTRY_URL }}/kefu-agent:latest
            echo "镜像已推送至 ${{ secrets.REGISTRY_URL }}"
          else
            echo "未配置镜像仓库（REGISTRY_URL secret），跳过推送"
          fi

      - name: 部署到生产环境
        run: |
          # 自动部署（需配置 DEPLOY_SERVER / DEPLOY_SSH_KEY secrets）
          if [ -n "${{ secrets.DEPLOY_SERVER }}" ]; then
            python deploy.py --server ${{ secrets.DEPLOY_SERVER }}
          else
            echo "未配置部署目标（DEPLOY_SERVER secret），跳过自动部署"
          fi
